version: "3.8"

services:
  php:
    build: ./docker/php
    container_name: calendar-php
    volumes:
      - ./src:/var/www
    working_dir: /var/www

  nginx:
    image: nginx:1.25-alpine
    container_name: calendar-nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: calendar-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: calendar_app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
      TZ: Asia/Tokyo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: